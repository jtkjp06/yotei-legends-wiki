<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001a0a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#003d1a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e65100;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff8f00;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="400" cy="225" r="180" fill="none" stroke="rgba(230,81,0,0.12)" stroke-width="2"/>
  <circle cx="400" cy="225" r="140" fill="none" stroke="rgba(230,81,0,0.08)" stroke-width="1"/>
  <!-- Bow silhouette -->
  <g transform="translate(400,225)" filter="url(#glow)">
    <!-- Bow arc -->
    <path d="M -20,-160 Q -60,0 -20,160" fill="none" stroke="#ff8f00" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
    <!-- Bowstring -->
    <line x1="-20" y1="-160" x2="-20" y2="160" stroke="rgba(255,200,100,0.6)" stroke-width="2" stroke-dasharray="4,3"/>
    <!-- Arrow -->
    <line x1="-20" y1="0" x2="100" y2="-30" stroke="url(#acc)" stroke-width="4" stroke-linecap="round"/>
    <polygon points="100,-30 88,-20 90,-35" fill="#ff8f00" opacity="0.9"/>
    <!-- Arrowhead detail -->
    <line x1="-20" y1="0" x2="-50" y2="8" stroke="rgba(255,200,100,0.5)" stroke-width="2"/>
  </g>
  <rect x="0" y="380" width="800" height="70" fill="rgba(0,0,0,0.55)"/>
  <text x="400" y="405" font-family="'Noto Sans JP', sans-serif" font-size="13" fill="rgba(255,200,100,0.6)" text-anchor="middle">キャラクター画像 準備中</text>
  <text x="400" y="435" font-family="'Noto Sans JP', sans-serif" font-size="28" font-weight="bold" fill="#ff8f00" text-anchor="middle" filter="url(#glow)">弓取（Archer）</text>
</svg>
