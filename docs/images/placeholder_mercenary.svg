<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a001a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#200040;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e65100;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff8f00;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="400" cy="225" r="180" fill="none" stroke="rgba(230,81,0,0.12)" stroke-width="2"/>
  <circle cx="400" cy="225" r="140" fill="none" stroke="rgba(230,81,0,0.08)" stroke-width="1"/>
  <!-- Dual katana silhouette -->
  <g transform="translate(400,225)" filter="url(#glow)">
    <!-- Left blade (angled) -->
    <g transform="rotate(-20)">
      <rect x="-5" y="-150" width="10" height="190" rx="3" fill="url(#acc)" opacity="0.85"/>
      <ellipse cx="0" cy="40" rx="22" ry="6" fill="#ff8f00" opacity="0.9"/>
      <rect x="-6" y="46" width="12" height="60" rx="3" fill="#bf360c" opacity="0.9"/>
    </g>
    <!-- Right blade (angled opposite) -->
    <g transform="rotate(20)">
      <rect x="-5" y="-150" width="10" height="190" rx="3" fill="url(#acc)" opacity="0.75"/>
      <ellipse cx="0" cy="40" rx="22" ry="6" fill="#ff8f00" opacity="0.8"/>
      <rect x="-6" y="46" width="12" height="60" rx="3" fill="#bf360c" opacity="0.8"/>
    </g>
  </g>
  <rect x="0" y="380" width="800" height="70" fill="rgba(0,0,0,0.55)"/>
  <text x="400" y="405" font-family="'Noto Sans JP', sans-serif" font-size="13" fill="rgba(255,200,100,0.6)" text-anchor="middle">キャラクター画像 準備中</text>
  <text x="400" y="435" font-family="'Noto Sans JP', sans-serif" font-size="28" font-weight="bold" fill="#ff8f00" text-anchor="middle" filter="url(#glow)">用心棒（Mercenary）</text>
</svg>
