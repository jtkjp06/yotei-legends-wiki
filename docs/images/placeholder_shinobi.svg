<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001a1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#003333;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e65100;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff8f00;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="400" cy="225" r="180" fill="none" stroke="rgba(230,81,0,0.12)" stroke-width="2"/>
  <circle cx="400" cy="225" r="140" fill="none" stroke="rgba(230,81,0,0.08)" stroke-width="1"/>
  <!-- Kusarigama silhouette: sickle + chain + weight -->
  <g transform="translate(400,225)">
    <!-- Sickle blade -->
    <path d="M -20,-80 Q 40,-120 60,-60 Q 40,-20 0,-10" fill="none" stroke="url(#acc)" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
    <!-- Sickle handle -->
    <rect x="-24" y="-80" width="8" height="90" rx="3" fill="#bf360c" opacity="0.9"/>
    <!-- Chain -->
    <path d="M -20,10 Q 20,60 -10,120 Q -40,160 10,190" fill="none" stroke="rgba(255,200,100,0.6)" stroke-width="3" stroke-dasharray="8,5"/>
    <!-- Weight (fundo) -->
    <circle cx="10" cy="190" r="16" fill="#e65100" opacity="0.9"/>
    <circle cx="10" cy="190" r="10" fill="#ff8f00" opacity="0.7"/>
  </g>
  <rect x="0" y="380" width="800" height="70" fill="rgba(0,0,0,0.55)"/>
  <text x="400" y="405" font-family="'Noto Sans JP', sans-serif" font-size="13" fill="rgba(255,200,100,0.6)" text-anchor="middle">キャラクター画像 準備中</text>
  <text x="400" y="435" font-family="'Noto Sans JP', sans-serif" font-size="28" font-weight="bold" fill="#ff8f00" text-anchor="middle">忍（Shinobi）</text>
</svg>
